apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-reader
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-reader
  template:
    metadata:
      labels:
        app: secret-reader
    spec:
      serviceAccountName: vaultpay-app-sa
      containers:
      - name: secret-reader
        image: 875522883478.dkr.ecr.eu-west-2.amazonaws.com/vaultpay/secret-reader:1.0.0
        ports:
        - containerPort: 8080
        env:
        - name: SECRET_ID
          value: "vaultpay/dev/app-secret"
        - name: AWS_REGION
          value: "eu-west-2"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
