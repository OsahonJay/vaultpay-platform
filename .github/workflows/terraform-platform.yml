name: Terraform Platform

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Validate AWS Layer
        run: |
          cd terraform/environments/dev-aws
          terraform init -backend=false
          terraform validate

      - name: Validate Kubernetes Layer
        run: |
          cd terraform/environments/dev-kubernetes
          terraform init -backend=false
          terraform validate

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_AWS_38,CKV_AWS_39,CKV2_AWS_57,CKV2_AWS_40,CKV_K8S_43,CKV_K8S_14,CKV_AWS_290,CKV_AWS_355,CKV_AWS_286,CKV_AWS_288,CKV_AWS_289,CKV_AWS_287,CKV_AWS_149,CKV_AWS_287,CKV_AWS_149

  terraform-plan-aws:
    name: Plan AWS
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::875522883478:role/github-actions-terraform-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: |
          cd terraform/environments/dev-aws
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev-aws
          terraform plan -no-color 2>&1 | tee plan-output.txt

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/dev-aws/plan-output.txt', 'utf8');
            const truncated = plan.length > 65000 ? plan.substring(0, 65000) + '\n... truncated' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan (AWS Layer)\n```\n' + truncated + '\n```'
            });

  terraform-apply-aws:
    name: Apply AWS
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::875522883478:role/github-actions-terraform-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: |
          cd terraform/environments/dev-aws
          terraform init

      - name: Pre-apply cleanup (dev only - not for production)
        run: |
          aws secretsmanager delete-secret \
            --secret-id vaultpay/dev/app-secret \
            --force-delete-without-recovery \
            --region eu-west-2 2>/dev/null || true
          
          aws logs create-log-group \
            --log-group-name /vaultpay/dev/vpc-flow-logs \
            --region eu-west-2 2>/dev/null || true

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev-aws
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform/environments/dev-aws
          terraform apply tfplan

  terraform-apply-kubernetes:
    name: Apply Kubernetes
    runs-on: ubuntu-latest
    needs: terraform-apply-aws
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::875522883478:role/github-actions-terraform-role
          aws-region: eu-west-2

      - name: Terraform Init
        run: |
          cd terraform/environments/dev-kubernetes
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev-kubernetes
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform/environments/dev-kubernetes
          terraform apply tfplan
