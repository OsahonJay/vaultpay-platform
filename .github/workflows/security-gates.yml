name: Security Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/terraform
        env:
          SEMGREP_RULES: p/security-audit
          SEMGREP_EXCLUDE_RULES: terraform.lang.security.eks-public-endpoint-enabled.eks-public-endpoint-enabled

  iac-scan:
    name: IaC Scanning (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_18,CKV_AWS_38,CKV_AWS_39

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  sca-scan:
    name: Dependency Scanning (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run Trivy for medium/low (non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: MEDIUM,LOW
          exit-code: 0

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  gate-summary:
    name: Security Gate Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, iac-scan, sca-scan]
    if: always()
    steps:
      - name: Check gate results
        run: |
          if [[ "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.sast-scan.result }}" == "failure" || \
                "${{ needs.iac-scan.result }}" == "failure" || \
                "${{ needs.sca-scan.result }}" == "failure" ]]; then
            echo "Security gates failed. Merge blocked."
            exit 1
          fi
          echo "All security gates passed."
