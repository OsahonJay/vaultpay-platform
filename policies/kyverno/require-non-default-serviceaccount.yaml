apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-default-serviceaccount
  annotations:
    policies.kyverno.io/title: Require Non-Default ServiceAccount
    policies.kyverno.io/description: >-
      Prevents pods from running as the default ServiceAccount.
      In VaultPay, all workloads must use a named ServiceAccount
      with an explicit IRSA annotation to ensure pod-level AWS
      authentication is enforced and auditable.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: check-serviceaccount
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - default
    validate:
      message: "Pods must use a named ServiceAccount. Using the default ServiceAccount is not permitted in VaultPay — all workloads require explicit IRSA-annotated ServiceAccounts."
      pattern:
        spec:
          serviceAccountName: "?*"
          =(serviceAccountName): "!default"
